<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales - Login</title>
<link rel="stylesheet" href="diseños/login.css">
</head>
<body>

<div class="wrapper">

    <!-- LOGIN -->
    <div id="loginSection" class="container">

        <div class="logo">
            <div class="logo-circle">$</div>
            <div class="logo-text">
                Finanzas
                <span>Personales</span>
            </div>
        </div>

        <h1>Iniciar sesión</h1>

        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" placeholder="Tu@email.com" required>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <button>Ingresar</button>

        <div class="register">
            ¿No tienes cuenta? <a href="#" id="linkRegistrar" class="button">Registrarte</a>
        </div>

        <div class="image">
            <img src="cartera.jpeg" alt="Imagen">
        </div>

    </div>

    <!-- REGISTRO -->
     
    <section id="registroSection" class="container">

    <!-- Logo igual que en login -->
    <div class="logo">
        <div class="logo-circle">$</div>
        <div class="logo-text">
            Finanzas
            <span>Personales</span>
        </div>
    </div>

    <div class="input-group">
        <label>Nombre de Usuario</label>
        <input type="text" placeholder="name" required>
    </div>
    <div class="input-group">
        <label>Crear contraseña</label>
        <input type="password" placeholder="••••••••" required>
    </div>
    <div class="input-group">
        <label>Confirmar contraseña</label>
        <input type="password" placeholder="••••••••" required>
    </div>
    <div class="input-group">
        <label>Ingrese su Correo</label>
        <input type="email" placeholder="Tu@email.com" required>
    </div>

    <button>Crear sesión</button>

    <div id="volverLogin">
        <span style="font-size:24px;">←</span>
        <span style="font-size:14px; margin-top:2px;">Back</span>
    </div>

    <div class="image">
        <img src="cartera.jpeg" alt="Imagen">
    </div>
    
</section>

</div>

<!-- JS para animación -->
<script>
const linkRegistrar = document.getElementById("linkRegistrar");
const registroSection = document.getElementById("registroSection");
const loginSection = document.getElementById("loginSection");
const volverLogin = document.getElementById("volverLogin");

// Mostrar registro con animación
linkRegistrar.addEventListener("click", function(event){
    event.preventDefault();
    loginSection.classList.add("hidden");
    setTimeout(() => {
        registroSection.classList.add("visible");
    }, 300);
});

// Volver al login con animación
volverLogin.addEventListener("click", function(){
    registroSection.classList.remove("visible");
    setTimeout(() => {
        loginSection.classList.remove("hidden");
    }, 300);
});
</script>

</body>
</html>
